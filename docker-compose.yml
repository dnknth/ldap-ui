services:
  ldap:
    image: dnknth/ldap-demo
    build: demo-ldap
    ports:
      - 127.0.0.1:389:389
    restart: unless-stopped

  ldap-ui:
    image: dnknth/ldap-ui
    build: .
    ports:
      - 127.0.0.1:5000:5000
    links:
      - ldap
    environment:
      LDAP_URL: "${LDAP_URL:-ldap://ldap/}"
      USE_TLS: ${USE_TLS:-}
      INSECURE_TLS: ${INSECURE_TLS:-}
      BIND_DN: "${BIND_DN:-cn=Fred Flintstone,ou=People,o=Flintstones}"
      BIND_PASSWORD: "${BIND_PASSWORD:-yabbadabbado}"
    restart: unless-stopped
